<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMEXUS - Categorias</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<header>
    <h1>GAMEXUS</h1>
    <nav>
        <a href="/">Inicio</a>
        <a href="/tienda">Tienda</a>
        <a href="/categorias">Categorias</a>
        <a href="/login">Login</a>
    </nav>
</header>

<section class="banner">
    <h2>Categorias disponibles</h2>
    <p>Selecciona una categoria y ve los titulos de la tienda</p>
</section>

<section class="category-grid">
    <a class="category-card" th:each="categoria : ${categorias}" th:href="@{/tienda(categoria=${categoria})}">
        <h3 th:text="${categoria}">Categoria</h3>
        <span>Ver juegos</span>
    </a>
</section>

<footer>
    <p>© 2026 GAMEXUS - Todos los derechos reservados</p>
</footer>
</body>
</html>
