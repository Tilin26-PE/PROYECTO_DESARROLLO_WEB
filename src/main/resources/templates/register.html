<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMEXUS - Registro</title>
    <link rel="stylesheet" href="/css/login.css">
</head>

<body>

<div class="container">
    <div class="login-box">
        <h2>Crear cuenta</h2>
        <p class="subtitle">Regístrate para continuar</p>

        <form action="/register" method="POST">

            <div class="input-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="input-group">
                <label for="email">Correo</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn-login" style="background:#22c55e;">
                Crear cuenta
            </button>

        </form>

        <p style="margin-top:20px; color:#b9c2ff;">
            ¿Ya tienes cuenta? <a href="/login" style="color:white;font-weight:600;">Inicia sesión</a>
        </p>
    </div>
</div>

</body>
</html>
