<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMEXUS - Registro</title>
    <link rel="stylesheet" href="/css/login.css">
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light-theme');
        }
    </script>
</head>

<body>

<header style="padding:20px 24px; display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap;">
    <h1 style="margin:0;">GAMEXUS</h1>
    <nav style="display:flex; gap:16px; flex-wrap:wrap; align-items:center;">
        <a href="/">Inicio</a>
        <a href="/tienda">Tienda</a>
        <a href="/categorias">Categorias</a>
            <a href="/catalogo">Base de Datos</a>
            <a href="/comparar">Comparar</a>
            <a href="/top-juegos">Top Juegos</a>
            <a href="/lanzamientos">Lanzamientos</a>
        <a th:if="${session.usuario != null}" href="/perfil">Perfil</a>
        <a th:if="${session.usuario != null}" href="/favoritos">Favoritos</a>
        <a th:if="${session.usuario != null}" href="/actividad">Actividad</a>
        <a th:if="${session.usuario == null}" href="/login">Login</a>
        <a th:if="${session.usuario == null}" href="/register">Register</a>
        <a href="/carrito">Carrito</a>
        <a th:if="${session.rol != null and session.rol == 'ROLE_ADMIN'}" href="/admin">Admin</a>
        <a th:if="${session.usuario != null}" href="/logout">Logout</a>
                <button id="theme-toggle" class="button-ghost" style="padding: 6px 12px; border-radius: 50%; width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text); margin-left: 10px;">🌓</button>`r`n        </nav>
</header>

    <!-- Discount Alerts Banner -->
    <div th:if="${favoritosConDescuento != null and !#lists.isEmpty(favoritosConDescuento)}" style="background: linear-gradient(135deg, rgba(124, 92, 255, 0.2), rgba(25, 211, 255, 0.15)); border: 1px solid var(--border); border-radius: 16px; padding: 14px 20px; margin: 20px auto 10px; max-width: 1200px; display: flex; flex-direction: column; gap: 10px; box-shadow: var(--shadow);">
        <div style="font-weight: 700; color: var(--accent-2); display: flex; align-items: center; gap: 8px; font-size: 1.05rem;">
            <span>🔔 ¡Alerta de Descuento en tus Favoritos!</span>
        </div>
        <div style="display: flex; flex-wrap: wrap; gap: 12px;">
            <div th:each="fav : ${favoritosConDescuento}" style="background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 6px 12px; display: flex; align-items: center; gap: 10px; font-size: 0.9rem;">
                <strong th:text="${fav.nombre}">Juego</strong>
                <span style="background: #ef4444; color: white; padding: 1px 5px; border-radius: 4px; font-weight: 700; font-size: 0.78rem;" th:text="'-' + ${fav.descuento} + '%'">-50%</span>
                <span th:text="'Ahora S/ ' + ${fav.getPrecioConDescuento()}" style="font-weight: 600; color: white;">Ahora S/ 0</span>
                <a th:href="@{/juego/{id}(id=${fav.id})}" style="color: var(--accent-2); font-weight: 700; text-decoration: none; margin-left: 6px;">Ver Ficha →</a>
            </div>
        </div>
    </div>

<div class="container">
    <div class="login-box">
        <h2>Crear cuenta</h2>
        <p class="subtitle">Regístrate para continuar</p>

        <form action="/register" method="POST">

            <div class="input-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="input-group">
                <label for="email">Correo</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn-login" style="background:#22c55e;">
                Crear cuenta
            </button>

        </form>

        <p style="margin-top:20px; color:#b9c2ff;">
            ¿Ya tienes cuenta? <a href="/login" style="color:white;font-weight:600;">Inicia sesión</a>
        </p>
    </div>
</div>

    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        if (themeToggleBtn) {
            themeToggleBtn.addEventListener('click', () => {
                document.documentElement.classList.toggle('light-theme');
                const theme = document.documentElement.classList.contains('light-theme') ? 'light' : 'dark';
                localStorage.setItem('theme', theme);
            });
        }
    </script>
</body>
</html>
