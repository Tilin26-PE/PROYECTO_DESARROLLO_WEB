<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMEXUS - Login</title>
    <link rel="stylesheet" href="/css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">
    <div class="login-box">
        <h2>GAMEXUS</h2>
        <p class="subtitle">Inicia sesión en tu cuenta</p>

        <p th:if="${error}" style="color:#ff6b6b; margin-bottom:12px; font-weight:600;" th:text="${error}"></p>
        <p th:if="${success}" style="color:#6bffb8; margin-bottom:12px; font-weight:600;" th:text="${success}"></p>

        <form action="/login" method="POST">
            <div class="input-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn-login">Ingresar</button>
        </form>

        <hr style="margin:18px 0; border-color: rgba(255,255,255,0.06)">

        <a href="/oauth2/authorization/google" class="btn-login"
           style="background:#4285F4; display:block; text-align:center; margin-top:10px;">
            Iniciar sesión con Google
        </a>

        <p style="margin-top:20px; color:#b9c2ff;">
            ¿No tienes cuenta? <a href="/register" style="color:white; font-weight:600;">Regístrate aquí</a>
        </p>
    </div>
</div>

</body>
</html>
