spring.application.name=proyecto

# MySQL datasource
spring.datasource.url=jdbc:mysql://localhost:3306/gamexus?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Las semillas de datos se cargan desde DataInitializer.java
# OAuth2 - Google Login
spring.security.oauth2.client.registration.google.client-id=&{pega aqui}
spring.security.oauth2.client.registration.google.client-secret=%{pega aqui}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}


